name: Bug report
description: Report something that isn't working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so we can reproduce the issue quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. Include the repo you were working in (if shareable).
      placeholder: |
        1. Open VSCode in a repo with the `announcement` label configured
        2. Run `Announcements: Refresh`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error messages from the Output panel (`Team Announcements` channel) if available.
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VSCode version
      placeholder: e.g. 1.90.0
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: gh-version
    attributes:
      label: GitHub CLI version (`gh --version`)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Windows 11, Ubuntu 22.04
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else that might help.
